services:
  chromadb:
    container_name: chromadb
    image: chromadb/chroma:latest
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - /srv/app_data/home-server/chromadb:/chroma/chroma
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /srv/app_data/home-server/ollama:/root/.ollama
    ports:
      - 11434:11434
    restart: unless-stopped
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 2G

  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/app_data/home-server/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    ports:
      - 8123:8123
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome
    network_mode: host
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/app_data/home-server/adguardhome/work:/opt/adguardhome/work
      - /srv/app_data/home-server/adguardhome/conf:/opt/adguardhome/conf
    deploy:
      resources:
        limits:
          memory: 512M

  tailscale:
    container_name: tailscale
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-exit-node --advertise-routes=192.168.2.0/24
    image: tailscale/tailscale:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 9696:9696
      - 8191:8191
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=nordvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASS}
      - SERVER_COUNTRIES=Netherlands
      - FIREWALL_OUTBOUND_SUBNETS=172.21.0.0/16
      - FIREWALL_INPUT_PORTS=9696,8191,8080,6881
      - DOT=off
    networks:
      - home-server-network
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "1.1.1.1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - sonarr:172.21.0.1
      - radarr:172.21.0.1
      - server:172.21.0.1

  filebrowser:
    command:
      - --database
      - /database.db
      - --config
      - /config/settings.json
      - --address
      - 0.0.0.0
      - --port
      - '80'
    container_name: filebrowser
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - FB_PORT=80
      - FB_ADDRESS=0.0.0.0
    image: filebrowser/filebrowser:latest
    ports:
      - 8082:80
    restart: unless-stopped
    networks:
      - home-server-network
    volumes:
      - /srv/app_data/home-server/filebrowser/settings.json:/config/settings.json
      - /srv/app_data/home-server/filebrowser/filebrowser.db:/database.db
      - /srv:/srv/srv
    deploy:
      resources:
        limits:
          memory: 512M

  homepage:
    container_name: homepage
    user: "1000:1000"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - ADGUARD_USER=${ADGUARD_USER}
      - ADGUARD_PASS=${ADGUARD_PASS}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - BAZARR_API_KEY=${BAZARR_API_KEY}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - IMMICH_API_KEY=${IMMICH_API_KEY}
      - OVERSEERR_API_KEY=${OVERSEERR_API_KEY}
      - TDARR_API_KEY=${TDARR_API_KEY}
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
    image: ghcr.io/gethomepage/homepage:latest
    ports:
      - 3001:3000
    restart: unless-stopped
    extra_hosts:
      - server:172.21.0.1
    volumes:
      - /srv/app_data/home-server/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    container_name: prometheus
    user: "1000:1000"
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /srv/app_data/home-server/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /srv/app_data/home-server/prometheus/data:/prometheus
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    container_name: grafana
    user: "1000:1000"
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    image: grafana/grafana:latest
    ports:
      - 3002:3000
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  node-exporter:
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
    container_name: node_exporter
    image: prom/node-exporter:latest
    ports:
      - 9100:9100
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - home-server-network

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - 8083:8080
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  plex:
    container_name: plex
    device_cgroup_rules:
      - c 195:* rwm
      - c 508:* rwm
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
    image: lscr.io/linuxserver/plex:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/plex:/config
      - /srv/media:/srv/media:ro
      - /srv/media/movies:/movies:ro
      - /srv/media/tv:/tv:ro
    deploy:
      resources:
        limits:
          memory: 4G

  overseerr:
    container_name: overseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: ghcr.io/seerr-team/seerr:latest
    ports:
      - 5055:5055
    restart: unless-stopped
    extra_hosts:
      - server:172.21.0.1
    volumes:
      - /srv/app_data/home-server/overseerr:/app/config
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  radarr:
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/radarr:/config
      - /srv/media:/srv/media
      - /srv/downloads:/srv/downloads
    networks:
      - home-server-network
    ports:
      - 7878:7878
    deploy:
      resources:
        limits:
          memory: 1G

  sonarr:
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/sonarr:/config
      - /srv/media:/srv/media
      - /srv/downloads:/srv/downloads
    networks:
      - home-server-network
    ports:
      - 8989:8989
    deploy:
      resources:
        limits:
          memory: 1G

  prowlarr:
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/prowlarr:/config
    network_mode: service:gluetun
    depends_on:
      - gluetun
    deploy:
      resources:
        limits:
          memory: 512M

  bazarr:
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: lscr.io/linuxserver/bazarr:latest
    ports:
      - 6767:6767
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/bazarr:/config
      - /srv/media:/srv/media
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  qbittorrent:
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    image: lscr.io/linuxserver/qbittorrent:latest
    network_mode: service:gluetun
    depends_on:
      - gluetun
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/qbittorrent:/config
      - /srv/downloads:/srv/downloads
    deploy:
      resources:
        limits:
          memory: 2G

  unpackerr:
    container_name: unpackerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: golift/unpackerr:latest
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/unpackerr:/config
      - /srv/media:/srv/media
      - /srv/downloads:/srv/downloads
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  tdarr:
    container_name: tdarr
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - serverIP=tdarr
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - nodeID=MainNode
      - auth=false
      - authSecretKey=${TDARR_AUTH_SECRET}
      - apiKey=${TDARR_API_KEY}
    image: ghcr.io/haveagitgat/tdarr:latest
    ports:
      - 8265:8265
      - 8266:8266
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/tdarr/server:/app/server
      - /srv/app_data/home-server/tdarr/configs:/app/configs
      - /srv/app_data/home-server/tdarr/logs:/app/logs
      - /srv/app_data/home-server/tdarr_cache:/temp
      - /srv/media:/srv/media
      - /srv/downloads:/srv/downloads
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 2G

  flaresolverr:
    container_name: flaresolverr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    image: flaresolverr/flaresolverr:latest
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    deploy:
      resources:
        limits:
          memory: 512M

  immich-server:
    command:
      - start.sh
      - immich
    container_name: immich_server
    depends_on:
      - immich-redis
      - immich-postgres
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DB_HOSTNAME=immich_postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=${IMMICH_DB_PASS}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich_redis
      - TYPESENSE_ENABLED=false
    image: ghcr.io/immich-app/immich-server:release
    ports:
      - 2283:2283
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 4G

  immich-machine-learning:
    container_name: immich_machine_learning
    devices:
      - /dev/dri:/dev/dri
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /srv/app_data/home-server/immich/model_cache:/cache
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 2G

  immich-postgres:
    container_name: immich_postgres
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASS}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/immich/postgres:/var/lib/postgresql/data
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  immich-redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 256M

  firefly-app:
    container_name: firefly_app
    depends_on:
      - firefly-db
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_KEY=${FIREFLY_APP_KEY}
      - DB_HOST=firefly-db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASS}
      - APP_URL=http://server:8081
    image: fireflyiii/core:latest
    ports:
      - 8081:8080
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/firefly/upload:/var/www/html/storage/upload
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 1G

  firefly-db:
    container_name: firefly_db
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER=firefly
      - MYSQL_PASSWORD=${FIREFLY_DB_PASS}
      - MYSQL_DATABASE=firefly
    image: mariadb:lts
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/firefly/db:/var/lib/mysql
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  firefly-importer:
    container_name: firefly_importer
    depends_on:
      - firefly-app
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - FIREFLY_III_URL=http://firefly_app:8080
      - VANITY_URL=http://server:8081
      - APP_URL=http://server:8084
      - FIREFLY_III_ACCESS_TOKEN=${FIREFLY_ACCESS_TOKEN}
      - IMPORT_DIR_ALLOWLIST=/import
    image: fireflyiii/data-importer:latest
    ports:
      - 8084:8080
    restart: unless-stopped
    volumes:
      - /srv/app_data/home-server/firefly/imports:/import
    networks:
      - home-server-network
    deploy:
      resources:
        limits:
          memory: 512M

  firefly-cron:
    command:
      - sh
      - -c
      - echo "0 3 * * * wget -qO- http://firefly-app:8080/api/v1/cron/$$STATIC_CRON_TOKEN"
        | crontab - && crond -f
    container_name: firefly_cron
    image: alpine
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - STATIC_CRON_TOKEN=${STATIC_CRON_TOKEN}
    restart: unless-stopped
    networks:
      - home-server-network

  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - DOCKER_API_VERSION=1.53
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  home-server-network:
    external: true
