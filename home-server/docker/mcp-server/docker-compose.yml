name: mcp-agents
services:
  home-server-redis:
    image: redis:7-alpine
    container_name: home-server-redis
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - home-server-network

  mcp-core:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-core
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MCP_SERVER_MODE=core
      - LOG_LEVEL=info
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/docker/mcp-server/home-server-ts:/app/home-server-ts
      - /srv:/srv:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - home-server-network

  mcp-infra:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-infra
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MCP_SERVER_MODE=infra
      - LOG_LEVEL=info
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/docker/mcp-server/home-server-ts:/app/home-server-ts
      - /srv:/srv:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - home-server-network

  mcp-media:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-media
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MCP_SERVER_MODE=media
      - LOG_LEVEL=info
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY}
      - BAZARR_API_KEY=${BAZARR_API_KEY}
      - OVERSEERR_API_KEY=${OVERSEERR_API_KEY}
      - TDARR_API_KEY=${TDARR_API_KEY}
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - /srv/docker/mcp-server/home-server-ts:/app/home-server-ts
      - /srv:/srv:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - home-server-network

  mcp-home:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp-home
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MCP_SERVER_MODE=home
      - LOG_LEVEL=info
      - HASS_URL=${HASS_URL}
      - HASS_TOKEN=${HASS_TOKEN}
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - /srv/docker/mcp-server/home-server-ts:/app/home-server-ts
      - /srv:/srv:ro
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - home-server-network

  mcp-jules:
    build:
      context: ./jules-agent-factory
      dockerfile: Dockerfile.jules
    container_name: mcp-jules
    env_file: .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LOG_LEVEL=info
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - /srv/docker/mcp-server/jules-agent-factory:/app
      - /srv:/srv:ro
    networks:
      - home-server-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC collector
      - "4318:4318"   # OTLP HTTP collector
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - home-server-network
    restart: unless-stopped

  mcp-db:
    image: postgres:16-alpine
    container_name: mcp-db
    environment:
      - POSTGRES_USER=mcp_admin
      - POSTGRES_PASSWORD=${MCP_DB_PASSWORD}
      - POSTGRES_DB=mcp_state
    volumes:
      - /srv/app_data/home-server/mcp-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - home-server-network
    restart: unless-stopped

networks:
  home-server-network:
    external: true
