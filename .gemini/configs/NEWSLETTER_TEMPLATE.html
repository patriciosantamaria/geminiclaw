<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vopak Strategic Intelligence | {{DATE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vopak Branding v3.0 */
            --vopak-deep-blue: #0a2373;
            --vopak-cyan: #00cfe1;
            --vopak-light-blue: #009ef5;
            --vopak-cobalt: #283ce1;
            --vopak-steel: #46555a;
            --vopak-grey: #e1e1e1;
            --bg-light: #f4f7f6;
            --text-dark: #1a1a1a;
            --text-muted: #555555;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 0px;
            box-shadow: 0 8px 30px rgba(10, 35, 115, 0.08);
            overflow: hidden;
            border-top: 6px solid var(--vopak-cyan);
        }

        .header {
            background-color: var(--vopak-deep-blue);
            color: #ffffff;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 10px 0 0;
            font-size: 16px;
            color: var(--vopak-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            padding: 40px 40px;
        }

        .category-title {
            color: var(--vopak-deep-blue);
            font-size: 24px;
            font-weight: 800;
            border-bottom: 3px solid var(--vopak-grey);
            padding-bottom: 12px;
            margin-top: 40px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        .category-title:first-child {
            margin-top: 0;
        }

        .news-card {
            background: #ffffff;
            border-left: 4px solid var(--vopak-deep-blue);
            padding: 25px 20px 25px 30px;
            margin-bottom: 30px;
            border-radius: 0px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s ease;
        }

        .news-card:hover {
            transform: translateX(5px);
            border-left-color: var(--vopak-cyan);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .card-title {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--vopak-deep-blue);
            line-height: 1.3;
        }

        .card-content {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-align: justify;
        }

        .insight-box {
            background-color: rgba(0, 207, 225, 0.08);
            border: 1px solid rgba(0, 207, 225, 0.3);
            padding: 15px 20px;
            border-radius: 0px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .insight-box strong {
            color: var(--vopak-deep-blue);
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .insight-box p {
            margin: 0 0 12px 0;
        }
        
        .insight-box p:last-child {
            margin: 0;
        }

        .read-more {
            display: inline-block;
            font-size: 14px;
            font-weight: 700;
            color: var(--vopak-light-blue);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .read-more:hover {
            color: var(--vopak-deep-blue);
        }

        .read-more::after {
            content: " →";
            color: var(--vopak-cyan);
            font-weight: 800;
        }

        .footer {
            background-color: var(--vopak-steel);
            color: #ffffff;
            text-align: center;
            padding: 30px;
            font-size: 13px;
        }
        
        .footer strong {
            color: var(--vopak-cyan);
        }

        @media (max-width: 600px) {
            .content { padding: 20px; }
            .header { padding: 30px 20px; }
            .news-card { padding: 20px 15px 20px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vopak Strategic Intelligence</h1>
            <p>Global IT & Super Admin Briefing | {{DATE}}</p>
        </div>
        
        <div class="content">

        </div>

        <div class="footer">
            Generated autonomously by <strong>GeminiClaw V4.0</strong> for Patricio Santamaria & Yassin Bahasuan.<br>
            Flow Forward Strategy | Trust, Collaboration, Courage
        </div>
    </div>
</body>
</html>
